name: tests

on:
  push:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'API base URL (leave empty for production)'
        required: false
        default: 'https://unravel.finance'

jobs:
  run-tests:
    strategy:
      matrix:
        os:
          # - ubuntu-latest
          - macos-latest
        python-version:
          # - "3.11"
          - "3.12"

    runs-on: ${{ matrix.os }}

    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: setup-python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: install-dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[tests]"

      - name: run-tests
        env:
          UNRAVEL_API_KEY: ${{ secrets.UNRAVEL_API_KEY }}
          UNRAVEL_BASE_URL: ${{ secrets.UNRAVEL_BASE_URL }}
          BASE_URL: ${{ inputs.base_url || 'https://unravel.finance' }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: pytest . -s --cov --durations 0

      - uses: codecov/codecov-action@v3
